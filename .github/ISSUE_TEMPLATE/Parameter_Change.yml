name: Design Parameter Change
description: Raise a proposed change to a CSS or MMS design parameter
title: "[PARAMETER CHANGE]: "
labels:
  - parameter-change
  - change-control
  
body:
  - type: input
    id: parameter
    attributes:
      label: Parameter being changed
      placeholder: e.g. Payload mass, wing span, battery capacity
 
  - type: input
    id: current_value
    attributes:
      label: Current value
      placeholder: e.g. 5 kg
 
  - type: input
    id: proposed_value
    attributes:
      label: Proposed value
      placeholder: e.g. 8 kg
 
  - type: textarea
    id: rationale
    attributes:
      label: Rationale for change
      description: Why is this parameter change required?
      
  - type: textarea
    id: image_upload
    attributes:
      label: Upload supporting image or screenshot
      description: Drag and drop JPG/PNG screenshots directly into this field after the issue is created.
      placeholder: Paste or drag image files here
      
  - type: checkboxes
    id: recommended_models
    attributes:
      label: Engineer Recommended affected models
      options:
        - label: Parametric Model Range
        - label: Reliability Model
        - label: CAD
        - label: Bill of Materials
 
  - type: textarea
    id: expected_impact
    attributes:
      label: Expected impact
      placeholder: Performance, reliability, mass, verification evidence, compliance, cost

   - type: textarea
    id: chief_engineer_decision
    attributes:
      label: Chief Engineer model re-run decision
      description: To be completed during technical review.
      placeholder: Chief Engineer to confirm authorised model re-runs, rejected re-runs, and rationale.
      
  - type: dropdown
    id: review_decision
    attributes:
      label: Required Chief Engineer action
      options:
        - Impact assessment required
        - Approve for implementation
        - Reject change
        - Request further analysis
